name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
  # Manual escape hatch. A PR whose head commit was produced by a token
  # that doesn't trigger workflows (e.g. a GITHUB_TOKEN branch-update)
  # never gets a CI run, so its required checks sit at "Expected". Running
  # this workflow manually against the PR's head ref creates check runs on
  # that commit, which Branch Protection accepts. On a manual dispatch we
  # force both required jobs to run regardless of the path filter, so both
  # required contexts report.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into the Node 24 runtime for JavaScript-based actions
# (actions/checkout, actions/setup-node, shivammathur/setup-php, etc.).
# GitHub is deprecating Node 20 — June 2, 2026 forces this default
# and September 16, 2026 removes Node 20 entirely. Setting the env var
# now silences the deprecation warning and pre-confirms that every
# action we use is compatible with the new runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which top-level area changed. Downstream jobs gate on these
  # outputs so a PR that only touches app/ or docs/ doesn't waste runner
  # minutes on the PHP + MySQL + Node build. The jobs still report a
  # status (skipped), which Branch Protection treats as passing — so the
  # required-check names stay stable.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            scripts:
              - '.github/scripts/**'
              - '.github/workflows/ci.yml'

  api-test:
    name: api / phpunit
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: vaultkeeper_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: api

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: vaultkeeper_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, zip, gd, dom, xml, ctype, fileinfo, openssl, tokenizer
          coverage: none
          tools: composer:v2

      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan jwt:secret --force --ansi

      - name: Wait for MySQL
        run: |
          tries=30
          while [ "$tries" -gt 0 ]; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "mysql ready"
              exit 0
            fi
            tries=$((tries - 1))
            sleep 1
          done
          echo "mysql did not become ready in time" >&2
          exit 1

      - name: Run Unit tests
        run: php artisan test --testsuite=Unit

      - name: Run Feature tests
        run: php artisan test --testsuite=Feature

  web-build:
    name: web / vite build
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  script-tests:
    name: scripts / bats
    needs: changes
    if: needs.changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run jira-transition tests
        run: bats .github/scripts/jira-transition.test.bats
