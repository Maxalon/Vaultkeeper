name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into the Node 24 runtime for JavaScript-based actions
# (actions/checkout, actions/setup-node, shivammathur/setup-php, etc.).
# GitHub is deprecating Node 20 — June 2, 2026 forces this default
# and September 16, 2026 removes Node 20 entirely. Setting the env var
# now silences the deprecation warning and pre-confirms that every
# action we use is compatible with the new runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-test:
    name: api / phpunit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: vaultkeeper_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: api

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: vaultkeeper_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, zip, gd, dom, xml, ctype, fileinfo, openssl, tokenizer
          coverage: none
          tools: composer:v2

      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan jwt:secret --force --ansi

      - name: Wait for MySQL
        run: |
          tries=30
          while [ "$tries" -gt 0 ]; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "mysql ready"
              exit 0
            fi
            tries=$((tries - 1))
            sleep 1
          done
          echo "mysql did not become ready in time" >&2
          exit 1

      - name: Run PHPUnit
        run: php artisan test

  web-build:
    name: web / vite build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
