name: Auto-update PRs on staging push

# When staging moves, the open PRs targeting it may need a rebase
# before they can merge. GitHub doesn't fire a webhook when a PR's
# mergeability flips due to base movement, so the auto-merge
# pipeline would otherwise silently stall.
#
# This workflow calls "Update branch" on every open PR targeting
# staging. On success, GitHub creates a merge commit on the PR
# branch which fires `pull_request.synchronize` — that re-runs CI
# and (if peer-approval is still on the latest commit) lets auto-
# merge proceed. On conflict, the workflow tags the PR with the
# `needs-rebase` label; the bots router fires the PR author on
# that label so the dev rebases manually.

on:
  push:
    branches: [staging]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure needs-rebase label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create needs-rebase \
            --repo "$GITHUB_REPOSITORY" \
            --description "Conflicts against staging; PR author must rebase" \
            --color D73A4A \
            --force

      - name: Update each open PR targeting staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t PRS < <(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base staging \
            --state open \
            --json number \
            --jq '.[].number')

          if [ ${#PRS[@]} -eq 0 ]; then
            echo "No open PRs targeting staging."
            exit 0
          fi

          for num in "${PRS[@]}"; do
            echo "::group::PR #${num}"
            # `gh pr update-branch` POSTs to /pulls/:n/update-branch;
            # it returns 422 when the base can't be merged cleanly.
            if gh pr update-branch "$num" --repo "$GITHUB_REPOSITORY"; then
              # If the PR had the label from a previous run, drop it —
              # the rebase resolved cleanly this time round.
              gh pr edit "$num" --repo "$GITHUB_REPOSITORY" \
                --remove-label needs-rebase 2>/dev/null || true
              echo "Updated PR #${num} (label cleared if present)."
            else
              echo "Conflict on PR #${num} — labelling needs-rebase."
              gh pr edit "$num" --repo "$GITHUB_REPOSITORY" \
                --add-label needs-rebase
            fi
            echo "::endgroup::"
          done
