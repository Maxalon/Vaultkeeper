# Shared security-header block, include'd from every location that
# sets its own add_header directives.
#
# Why the duplication: nginx's add_header behavior is "any add_header
# in the innermost location wipes all inherited add_header directives
# from parent contexts". So setting headers once at the server level
# is NOT enough — any location that has its own add_header (for e.g.
# Cache-Control) silently loses everything the server block set.
#
# The standard workaround is to put the headers in a single include
# file and pull it in from every location that needs its own headers.

add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
add_header X-Frame-Options           "DENY" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
