# Security headers for the Adminer DB UI.
#
# Adminer is a server-rendered PHP app whose pages ship inline <script>
# and <style> blocks (table sort, column resize, dialog dismiss). The
# strict app-wide CSP blocks them, so this snippet relaxes script-src /
# style-src for inline content. Same approach as security-headers-horizon.conf.
#
# Scope: only included from the /db location in default.prod.conf.template.
# Every header from the strict set is restated here because nginx wipes
# inherited add_header directives the moment a location adds even one
# of its own.

add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
add_header X-Frame-Options           "DENY" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
