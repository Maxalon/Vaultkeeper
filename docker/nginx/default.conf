server {
    listen 80;
    server_name _;

    # Laravel API — PHP-FPM (php-fpm container "api")
    # Critical: REQUEST_URI keeps the /api prefix so Laravel's apiPrefix:'api' routing matches.
    location /api {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO "";
    }

    # Static assets (set symbols, mana symbols, card-back) served directly
    # from the api volume's public/storage symlink — bypassing Vite so SVG
    # images render instead of falling through to the SPA fallback.
    location /storage/ {
        alias /var/www/html/public/storage/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vue dev server (Vite) with HMR websocket support
    location / {
        proxy_pass http://web:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
