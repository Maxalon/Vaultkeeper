# Security headers for the Horizon dashboard.
#
# Horizon ships a Vue SPA with bootstrap data injected via an inline
# <script> tag, which the strict app-wide script-src='self' policy
# blocks. This snippet inherits the rest of the strict header set and
# only relaxes script-src / style-src for inline content.
#
# Scope: only included from the /horizon location in default.prod.conf.template.
# The login / setup pages and the rest of the app keep the strict CSP
# since they don't need inline scripts.

add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
add_header X-Frame-Options           "DENY" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
