server {
    listen 80;
    server_name _;

    # ─── Static SPA root ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Laravel API — fastcgi to php-fpm in the api container.
    # Critical: REQUEST_URI keeps the /api prefix so Laravel's
    # apiPrefix:'api' routing matches.
    location /api {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO "";

        # Don't let slow php-fpm workers stall nginx for a full request
        # cycle — fail fast so the client sees the problem.
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;
    }

    # Laravel health endpoint — also goes through php-fpm.
    location = /up {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO "";
        access_log off;
    }

    # /storage/* (set symbols, mana symbols, card back) proxies to the
    # MinIO bucket. MinIO serves objects at /<bucket>/<key>, so we rewrite
    # /storage/sets/XYZ.svg -> /vaultkeeper-assets/sets/XYZ.svg. The
    # bucket is marked public (download) by the minio-init one-shot, so
    # no signed URLs are needed.
    #
    # nginx caches responses aggressively — these files are immutable
    # per Scryfall's versioning (a new symbol would have a new path)
    # so a 7-day edge cache is safe and drops a huge amount of load
    # off MinIO for the hot static assets.
    location /storage/ {
        rewrite ^/storage/(.*)$ /vaultkeeper-assets/$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # If MinIO is briefly unavailable, 502 fast instead of stalling
        # the nginx worker.
        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
    }

    # Horizon dashboard — Laravel routes served by php-fpm, same as /api.
    # Gated by HorizonServiceProvider::gate() (env-driven email allowlist).
    location /horizon {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO "";
        access_log off;
    }

    # ─── SPA assets ──────────────────────────────────────────────────────────
    # Fingerprinted JS / CSS / image files from Vite land under
    # /assets/ with content-hashed filenames, so they can be cached
    # forever safely.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA fallback ────────────────────────────────────────────────────────
    # Everything else falls through to index.html so the Vue router can
    # handle client-side routes. index.html itself must never be cached,
    # otherwise clients will keep loading stale asset references after
    # a deploy.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
