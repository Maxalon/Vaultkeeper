# http-level rate limit zones. Loaded automatically because this file lives
# under /etc/nginx/conf.d/ and nginx.conf's default http{} include picks up
# every *.conf file from that directory.
#
# The zones are *defined* here but not *applied* — server blocks opt in
# via `limit_req zone=... burst=...` where they want throttling.

# General API rate limit — applies to /api/* as a defense-in-depth layer
# ahead of Laravel's per-endpoint throttles. Meant to stop pure flood
# traffic before it reaches php-fpm, not to replace the app-level limits.
#   20 req/s average, up to 50 queued in a burst before 503.
#   10 MB zone ≈ 160k unique client IPs tracked.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;

# Stricter limit specifically for auth endpoints — brute-force
# protection at the edge. Complements Laravel's throttle:10,1 which
# blocks login attempts at 10/min per IP.
#   2 req/s average, burst 5. A normal user logging in never trips
#   this; a credential stuffer hits nginx first.
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=2r/s;
