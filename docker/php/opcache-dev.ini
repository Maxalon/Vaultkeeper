; Dev opcache posture.
;
; We WANT opcache on in dev for speed, but we MUST see source edits without
; restarting the container. The combination below is the canonical dev
; setting: opcache is enabled, but every request checks whether the script
; file on disk has changed (revalidate_freq=0 means "every request, no
; grace period"). This is slightly slower than prod posture, but it closes
; the "I edited a file and the old version is still running" footgun.
;
; The prod Dockerfile ships a different ini with validate_timestamps=0 and
; a larger accelerated files table.

opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
