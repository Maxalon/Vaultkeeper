; Prod opcache posture.
;
; Tuned for an application that is deployed by swapping the whole image —
; file timestamps on disk are never going to change between requests, so
; validate_timestamps=0 saves a stat() on every include. Invalidation
; happens at deploy time by restarting the container, not by touching files.
;
; JIT is on in tracing mode — the safest Laravel-compatible setting that
; still delivers a meaningful throughput win on hot paths.

opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=10
opcache.fast_shutdown=1

opcache.jit_buffer_size=64M
opcache.jit=tracing
