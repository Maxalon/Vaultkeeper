; Prod PHP runtime posture. Loaded after the distro-shipped ini files
; (Dockerfile names this `zz-runtime.ini` so it wins on conflicts).
;
; memory_limit: sized for the heaviest legitimate endpoint we have, with
; headroom. The previous default (128M) silently OOM'd LocationGroupController::index
; under FPM, returning empty 500s because log_errors was also off — see below.
;
; Error reporting: log to stderr so docker captures it alongside Laravel's
; stderr log channel, but never send PHP errors to HTTP clients. The image
; runs publicly on staging too, so display_errors stays off even when
; APP_DEBUG is true.

memory_limit = 512M

log_errors = On
error_log = /dev/stderr
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
