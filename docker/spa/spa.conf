server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite fingerprints these — same byte content forever, safe to
    # cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path serves index.html so the
    # Vue router handles deep links on hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never cache; otherwise a deploy that
    # ships new fingerprinted bundles still pins old clients to a
    # stale entry point.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }
}
