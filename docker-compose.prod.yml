# Production / staging compose file.
#
# Designed to run the same file with two different compose project names
# (and two different env files) on the same host:
#
#   docker compose -f docker-compose.prod.yml -p vaultkeeper_prod \
#       --env-file .env.prod up -d
#
#   docker compose -f docker-compose.prod.yml -p vaultkeeper_staging \
#       --env-file .env.staging up -d
#
# Each project gets its own containers, volumes, and project-internal
# network automatically via compose project naming. The `edge` network
# is shared across every project on the host so Caddy (kontrollzentrale
# repo) can reach api/adminer/minio/spa by container name; nothing in
# this file binds host ports anymore.
#
# Every image reference is env-driven so CI can pass IMAGE_TAG=<git-sha>
# (or the branch name) without touching this file.

services:

  # ─── MySQL 8.4 LTS ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-vaultkeeper}
      MYSQL_USER: ${DB_USERNAME:-vaultkeeper}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vaultkeeper
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ─── Redis 7 (queue + cache + sessions) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vaultkeeper
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─── MinIO (S3-compatible object storage for set symbols / assets) ────────
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vaultkeeper
      - edge
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # ─── Adminer (MySQL web UI for ops) ────────────────────────────────────────
  # Reached at adminer.vault.kontrollzentrale.de via Caddy. Caddy gates
  # every request via forward_auth against the api's /__db_auth endpoint
  # (same ops-password session that protects /horizon); on 401 Caddy
  # redirects to the env's horizon-login subdomain. Adminer's own login
  # form then takes the actual MySQL credentials. The DB user/host/
  # password are NEVER pre-filled by the container — operators type them
  # at first login per environment from .env.<env>.
  adminer:
    image: adminer:5
    restart: unless-stopped
    environment:
      ADMINER_DESIGN: dracula
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vaultkeeper
      - edge
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ─── MinIO bucket bootstrap (one-shot) ─────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${ASSETS_BUCKET:-vaultkeeper-assets} &&
        mc anonymous set download local/${ASSETS_BUCKET:-vaultkeeper-assets} &&
        echo 'bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - vaultkeeper

  # ─── Laravel api (php-fpm) ─────────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-vaultkeeper-api:local}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vaultkeeper}
      DB_USERNAME: ${DB_USERNAME:-vaultkeeper}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      FILESYSTEM_DISK: assets
      ASSETS_DISK_DRIVER: s3
      ASSETS_AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      ASSETS_AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ASSETS_AWS_DEFAULT_REGION: us-east-1
      ASSETS_BUCKET: ${ASSETS_BUCKET:-vaultkeeper-assets}
      ASSETS_AWS_ENDPOINT: http://minio:9000
      ASSETS_PUBLIC_URL: ${ASSETS_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # php-fpm listens on :9000. nginx is gone, so the previous /up
      # check via wget no longer applies; a TCP probe on the fastcgi
      # socket is the simplest signal that the worker pool is up.
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vaultkeeper
      - edge
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G

  # ─── Queue worker (Horizon) ────────────────────────────────────────────────
  worker:
    image: ${API_IMAGE:-vaultkeeper-api:local}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    stop_signal: SIGTERM
    stop_grace_period: 60s
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vaultkeeper}
      DB_USERNAME: ${DB_USERNAME:-vaultkeeper}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      FILESYSTEM_DISK: assets
      ASSETS_DISK_DRIVER: s3
      ASSETS_AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      ASSETS_AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ASSETS_AWS_DEFAULT_REGION: us-east-1
      ASSETS_BUCKET: ${ASSETS_BUCKET:-vaultkeeper-assets}
      ASSETS_AWS_ENDPOINT: http://minio:9000
      ASSETS_PUBLIC_URL: ${ASSETS_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - vaultkeeper
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─── Laravel scheduler ─────────────────────────────────────────────────────
  scheduler:
    image: ${API_IMAGE:-vaultkeeper-api:local}
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    stop_signal: SIGTERM
    stop_grace_period: 30s
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vaultkeeper}
      DB_USERNAME: ${DB_USERNAME:-vaultkeeper}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      FILESYSTEM_DISK: assets
      ASSETS_DISK_DRIVER: s3
      ASSETS_AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      ASSETS_AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ASSETS_AWS_DEFAULT_REGION: us-east-1
      ASSETS_BUCKET: ${ASSETS_BUCKET:-vaultkeeper-assets}
      ASSETS_AWS_ENDPOINT: http://minio:9000
      ASSETS_PUBLIC_URL: ${ASSETS_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - vaultkeeper
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ─── SPA sidecar (static SPA over plain HTTP on the docker network) ───────
  # Replaces the static-file-serving job the bundled nginx used to do.
  # Multi-stage build produces an nginx:alpine image with the prebuilt
  # SPA at /usr/share/nginx/html. No TLS, no host ports — Caddy reaches
  # this container by name on the edge network and terminates TLS itself.
  spa:
    image: ${SPA_IMAGE:-vaultkeeper-spa:local}
    build:
      context: .
      dockerfile: docker/spa/Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
        VITE_ASSETS_URL: ${ASSETS_PUBLIC_URL}
    restart: unless-stopped
    networks:
      - edge
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

volumes:
  db_data:
  redis_data:
  minio_data:

networks:
  vaultkeeper:
    driver: bridge
  # Shared external network. Caddy (kontrollzentrale repo) joins this
  # same network from a different compose project; create it once on
  # the host with `docker network create edge` before any project is
  # brought up.
  edge:
    external: true
    name: edge
