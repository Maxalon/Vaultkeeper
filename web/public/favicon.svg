<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Vault gold mark — outer rotated square outline + inner solid diamond.
       Hard-coded gold (#f0c35c) so the favicon renders identically across
       browsers (favicon currentColor support is patchy). -->
  <rect x="6.5" y="6.5" width="19" height="19" rx="2"
        fill="none" stroke="#f0c35c" stroke-width="2.2"
        transform="rotate(45 16 16)"/>
  <rect x="12" y="12" width="8" height="8"
        fill="#f0c35c"
        transform="rotate(45 16 16)"/>
</svg>
